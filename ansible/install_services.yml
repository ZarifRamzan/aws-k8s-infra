# ==============================================================================
# install_services.yml - Installs Docker & runs app containers on target nodes
# ==============================================================================
---
- name: Install Docker & Run Services
  hosts: build:monitoring:k8s_master:k8s_workers
  become: yes
  gather_facts: no
  tasks:
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present
        update_cache: yes
      retries: 3
      delay: 5

    - name: Add Docker official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present
        update_cache: yes

    - name: Install Docker Engine
      apt:
        name: 
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create tools directory on remote
      file:
        path: /tmp/docker-tools
        state: directory
        mode: '0755'

    - name: Copy Dockerfiles to remote
      copy:
        src: "tools/{{ item }}"
        dest: "/tmp/docker-tools/{{ item }}"
      loop:
        - Dockerfile.jenkins
        - Dockerfile.grafana
        - plugins.txt
        - datasources.yml

- name: Configure Build Server (Jenkins)
  hosts: build
  become: yes
  gather_facts: no
  tasks:
    - name: Build Jenkins Docker image
      docker_image:
        name: jenkins-custom
        source: build          # ✅ FIX: 'source' must be a string: build|pull|load|local
        build:                 # ✅ FIX: Build params go in separate 'build' block
          path: /tmp/docker-tools
          dockerfile: Dockerfile.jenkins
          pull: yes
        state: present
        force_source: yes      # Rebuild if Dockerfile changes
      retries: 3
      delay: 10

    - name: Run Jenkins container
      docker_container:
        name: jenkins
        image: jenkins-custom
        state: started
        restart_policy: unless-stopped
        ports:
          - "8080:8080"
          - "50000:50000"
        volumes:
          - jenkins_home:/var/jenkins_home
          - /var/run/docker.sock:/var/run/docker.sock
        env:
          JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"

- name: Configure Monitoring Server (Grafana + Prometheus)
  hosts: monitoring
  become: yes
  gather_facts: no
  tasks:
    - name: Create Prometheus config directory
      file:
        path: /etc/prometheus
        state: directory
        mode: '0755'

    - name: Create basic Prometheus config
      copy:
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']
        dest: /etc/prometheus/prometheus.yml
        mode: '0644'

    - name: Run Prometheus container
      docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "9090:9090"
        volumes:
          - prometheus_data:/prometheus
          - /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        command:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'

    - name: Build Grafana Docker image
      docker_image:
        name: grafana-custom
        source: build
        build:
          path: /tmp/docker-tools
          dockerfile: Dockerfile.grafana
          pull: yes
        state: present
        force_source: yes
      retries: 3
      delay: 10

    - name: Run Grafana container
      docker_container:
        name: grafana
        image: grafana-custom
        state: started
        restart_policy: unless-stopped
        ports:
          - "3000:3000"
        env:
          GF_SECURITY_ADMIN_USER: admin
          GF_SECURITY_ADMIN_PASSWORD: admin123
        volumes:
          - grafana_data:/var/lib/grafana

- name: Configure Kubernetes Nodes (MicroK8s)
  hosts: k8s_master:k8s_workers
  become: yes
  gather_facts: no
  tasks:
    - name: Install MicroK8s via snap
      community.general.snap:
        name: microk8s
        classic: yes
        state: present
      retries: 3
      delay: 10

    - name: Wait for MicroK8s to be ready
      command: microk8s status --wait-ready
      retries: 20
      delay: 5
      register: status
      until: status.rc == 0
      changed_when: false

    - name: Add ubuntu user to microk8s group
      user:
        name: ubuntu
        groups: microk8s
        append: yes

    - name: Enable essential MicroK8s add-ons (Master only)
      command: "microk8s enable {{ item }}"
      loop:
        - dns
        - registry
        - metrics-server
      when: inventory_hostname in groups['k8s_master']
      retries: 3
      delay: 5
      changed_when: false