# ==============================================================================
# join_cluster.yml - MicroK8s Cluster Setup, Joining & Labeling
# ==============================================================================
---
# PLAY 1: Configure Master Node
- name: Setup MicroK8s Master & Generate Token
  hosts: k8s_master
  become: yes
  gather_facts: no
  tasks:
    # 1. Ensure MicroK8s is installed
    - name: Check if MicroK8s is installed
      command: microk8s status
      register: microk8s_check
      ignore_errors: yes
      changed_when: false

    - name: Install MicroK8s (if missing)
      command: snap install microk8s --classic
      when: microk8s_check.rc != 0
      retries: 3
      delay: 10

    # 2. Wait for the cluster to be fully ready
    - name: Wait for MicroK8s to be ready
      command: microk8s status --wait-ready
      retries: 20
      delay: 5
      register: status
      until: status.rc == 0
      changed_when: false

    # 3. Configure permissions
    - name: Add ubuntu user to microk8s group
      user:
        name: ubuntu
        groups: microk8s
        append: yes

    # 4. Generate Join Token
    - name: Generate cluster join token
      command: microk8s add-node --token-ttl 3600
      register: join_token_output
      changed_when: true

    # ✅ Extract ONLY the connection string (IP:PORT/TOKEN)
    - name: Extract join connection string
      set_fact:
        join_connection: "{{ join_token_output.stdout | regex_search('microk8s join \\S+') | regex_replace('microk8s join ', '') }}"

    # 5. Label the Master Node
    # ✅ FIX: Use simple $(hostname) instead of Ansible facts
    - name: Label Master Node as 'role=master'
      shell: |
        NODE_NAME=$(hostname)
        microk8s kubectl label node "$NODE_NAME" role=master --overwrite
      args:
        executable: /bin/bash
      changed_when: true
      ignore_errors: yes  # Skip if label already exists

# PLAY 2: Configure and Join Worker Nodes
- name: Join Worker Nodes to Cluster
  hosts: k8s_workers
  become: yes
  gather_facts: no
  tasks:
    # 1. Install MicroK8s
    - name: Install MicroK8s on workers
      command: snap install microk8s --classic
      retries: 3
      delay: 10

    # 2. Wait for worker node to be ready locally
    - name: Wait for MicroK8s to be ready on workers
      command: microk8s status --wait-ready
      retries: 15
      delay: 5
      register: status
      until: status.rc == 0
      changed_when: false

    # 3. Delay to ensure Master has processed the token
    - name: Wait 15s for master token to propagate
      pause:
        seconds: 15

    # 4. Execute Join Command
    - name: Join cluster
      command: "microk8s join {{ hostvars[groups['k8s_master'][0]].join_connection }} --worker"
      register: join_result
      retries: 3
      delay: 15
      until: join_result.rc == 0
      changed_when: true

    # 5. Label Worker Node
    # ✅ FIX: Use simple $(hostname) instead of Ansible facts
    - name: Label Worker Node as 'role=worker'
      shell: |
        NODE_NAME=$(hostname)
        microk8s kubectl label node "$NODE_NAME" role=worker --overwrite
      args:
        executable: /bin/bash
      changed_when: true
      ignore_errors: yes  # Skip if label already exists